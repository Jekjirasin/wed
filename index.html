<!doctype html>
<html lang="th">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Skills Learning Platform</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <style>
        html, body {
            height: 100%;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .answer-card {
            animation: slideIn 0.3s ease-out;
        }

        .correct-answer {
            background-color: #d1fae5;
            border-color: #10b981;
        }

        .wrong-answer {
            background-color: #fee2e2;
            border-color: #ef4444;
        }

        .score-badge {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.8;
        }
    </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-gradient-to-br from-green-50 via-emerald-50 to-teal-50">
  <div class="app-wrapper h-full w-full overflow-auto">
   <!-- Header -->
   <header class="bg-white shadow-lg sticky top-0 z-50">
    <div class="max-w-4xl mx-auto px-6 py-6">
     <div class="flex justify-between items-center">
      <div>
       <h1 id="platform-title" class="text-3xl font-bold bg-gradient-to-r from-green-600 to-emerald-600 bg-clip-text text-transparent">การเรียนการงานอาชีพ</h1>
       <p id="topic-name" class="text-gray-600 mt-1">ทักษะอาชีพพื้นฐาน</p>
      </div>
      <div class="text-right">
       <p class="text-sm text-gray-600 mb-2">คะแนนของคุณ</p>
       <div class="score-badge" id="score-display">
        0/0
       </div>
      </div>
     </div>
    </div>
   </header><!-- Main Content -->
   <main class="max-w-4xl mx-auto px-6 py-8">
    <!-- Tab Navigation -->
    <div class="mb-8">
     <div class="flex gap-4 border-b-2 border-gray-200">
      <button id="practice-tab" class="px-6 py-3 font-semibold text-green-600 border-b-2 border-green-600 hover:bg-green-50 transition-colors"> <i data-lucide="book-open" class="inline mr-2" style="width: 20px; height: 20px;"></i> ฝึกทำโจทย์ </button> <button id="review-tab" class="px-6 py-3 font-semibold text-gray-600 hover:text-gray-800 hover:bg-gray-50 transition-colors"> <i data-lucide="history" class="inline mr-2" style="width: 20px; height: 20px;"></i> ดูประวัติ </button>
     </div>
    </div><!-- Practice Section -->
    <section id="practice-section" class="space-y-6">
     <!-- Question Card -->
     <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="mb-6">
       <span class="inline-block px-4 py-2 bg-green-100 text-green-700 rounded-full text-sm font-semibold mb-4"> โจทย์ที่ <span id="question-number">1</span> </span>
       <p class="question-text text-gray-800" id="question-text">อาชีพไหนที่ต้องมีทักษะการสื่อสารที่ดี?</p>
      </div><!-- Input Area -->
      <div class="space-y-4">
       <div>
        <label for="user-answer" class="block text-sm font-medium text-gray-700 mb-2"> คำตอบของคุณ </label> <input type="text" id="user-answer" class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none text-lg" placeholder="กรอกคำตอบของคุณ">
       </div><!-- Buttons -->
       <div class="flex gap-3 pt-2">
        <button id="submit-btn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2"> <i data-lucide="check-circle" style="width: 20px; height: 20px;"></i> ส่งคำตอบ </button> <button id="skip-btn" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2"> <i data-lucide="skip-forward" style="width: 20px; height: 20px;"></i> ข้ามโจทย์ </button>
       </div>
      </div>
     </div><!-- Results Display -->
     <div id="result-container"></div>
    </section><!-- Review Section -->
    <section id="review-section" class="hidden space-y-4">
     <div class="bg-white rounded-2xl shadow-lg p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">ประวัติการทำโจทย์</h2>
      <div id="history-list" class="space-y-4">
       <p class="text-gray-500 text-center py-8">ยังไม่มีประวัติการทำโจทย์</p>
      </div>
     </div>
    </section><!-- Sample Questions Data (Reference) -->
    <div id="sample-questions" class="hidden" data-questions="[
                {&quot;id&quot;: &quot;q1&quot;, &quot;topic&quot;: &quot;ทักษะสื่อสาร&quot;, &quot;question&quot;: &quot;อาชีพไหนที่ต้องมีทักษะการสื่อสารที่ดี?&quot;, &quot;answer&quot;: &quot;ก&quot;},
                {&quot;id&quot;: &quot;q2&quot;, &quot;topic&quot;: &quot;ทักษะด้านเทคโนโลยี&quot;, &quot;question&quot;: &quot;ทักษะใดที่สำคัญในยุคดิจิทัล? ก) การใช้คอมพิวเตอร์ ข) การใช้โปรแกรม ค) การใช้อินเทอร์เน็ต&quot;, &quot;answer&quot;: &quot;ทั้งหมด&quot;},
                {&quot;id&quot;: &quot;q3&quot;, &quot;topic&quot;: &quot;ความเป็นมืออาชีพ&quot;, &quot;question&quot;: &quot;ความเป็นมืออาชีพหมายถึงอะไร?&quot;, &quot;answer&quot;: &quot;มีวินัย ทำงานได้ดี ยึดมั่นในจริยธรรม&quot;},
                {&quot;id&quot;: &quot;q4&quot;, &quot;topic&quot;: &quot;ทักษะการทำงานเป็นทีม&quot;, &quot;question&quot;: &quot;ทักษะใดสำคัญสำหรับการทำงานเป็นทีม?&quot;, &quot;answer&quot;: &quot;การฟัง การทำงานร่วมกัน ความเคารพ&quot;},
                {&quot;id&quot;: &quot;q5&quot;, &quot;topic&quot;: &quot;การแก้ปัญหา&quot;, &quot;question&quot;: &quot;วิธีการแก้ปัญหาที่ดีคืออะไร?&quot;, &quot;answer&quot;: &quot;วิเคราะห์ปัญหา หาสาเหตุ หาทางแก้ไข&quot;}
            ]"></div>
   </main>
  </div>
  <script>
        let currentQuestionIndex = 0;
        let sampleQuestions = [];
        let allAnswers = [];
        let currentConfig = {
            platform_title: "การเรียนการงานอาชีพ",
            topic_name: "ทักษะอาชีพพื้นฐาน"
        };

        // Initialize SDKs
        const dataHandler = {
            onDataChanged(data) {
                allAnswers = data;
                updateScoreDisplay();
                updateHistoryList();
            }
        };

        async function initializeSystems() {
            // Initialize Data SDK
            const dataResult = await window.dataSdk.init(dataHandler);
            if (!dataResult.isOk) {
                console.error("Data SDK init failed");
            }

            // Initialize Element SDK
            if (window.elementSdk) {
                await window.elementSdk.init({
                    defaultConfig: currentConfig,
                    onConfigChange: (config) => {
                        currentConfig = config;
                        document.getElementById("platform-title").textContent = config.platform_title || "การเรียนการงานอาชีพ";
                        document.getElementById("topic-name").textContent = config.topic_name || "ทักษะอาชีพพื้นฐาน";
                    },
                    mapToCapabilities: (config) => ({
                        recolorables: [],
                        borderables: [],
                        fontEditable: undefined,
                        fontSizeable: undefined
                    }),
                    mapToEditPanelValues: (config) => new Map([
                        ["platform_title", config.platform_title || "การเรียนการงานอาชีพ"],
                        ["topic_name", config.topic_name || "ทักษะอาชีพพื้นฐาน"]
                    ])
                });
            }

            // Load sample questions
            const questionsData = document.getElementById("sample-questions").dataset.questions;
            sampleQuestions = JSON.parse(questionsData);
            
            displayCurrentQuestion();
            lucide.createIcons();
        }

        function displayCurrentQuestion() {
            if (currentQuestionIndex >= sampleQuestions.length) {
                currentQuestionIndex = 0;
            }

            const question = sampleQuestions[currentQuestionIndex];
            document.getElementById("question-number").textContent = currentQuestionIndex + 1;
            document.getElementById("question-text").textContent = question.question;
            document.getElementById("user-answer").value = "";
            document.getElementById("result-container").innerHTML = "";
            document.getElementById("user-answer").focus();
        }

        async function submitAnswer() {
            const userAnswer = document.getElementById("user-answer").value.trim();
            if (!userAnswer) {
                alert("กรุณากรอกคำตอบของคุณ");
                return;
            }

            const question = sampleQuestions[currentQuestionIndex];
            const isCorrect = userAnswer.toLowerCase() === question.answer.toLowerCase();

            // Save to data SDK
            const timestamp = new Date().toISOString();
            const result = await window.dataSdk.create({
                id: `answer-${Date.now()}`,
                topic: question.topic,
                question: question.question,
                userAnswer: userAnswer,
                correctAnswer: question.answer,
                isCorrect: isCorrect ? "true" : "false",
                timestamp: timestamp
            });

            if (result.isOk) {
                showResult(isCorrect, question.answer);
            }
        }

        function showResult(isCorrect, correctAnswer) {
            const resultContainer = document.getElementById("result-container");
            resultContainer.innerHTML = `
                <div class="answer-card bg-white rounded-2xl shadow-lg p-8 border-l-4 ${isCorrect ? "correct-answer" : "wrong-answer"}">
                    <div class="flex items-center gap-3 mb-4">
                        ${isCorrect 
                            ? '<i data-lucide="check-circle" style="width: 32px; height: 32px; color: #10b981;"></i>' 
                            : '<i data-lucide="x-circle" style="width: 32px; height: 32px; color: #ef4444;"></i>'
                        }
                        <h3 class="text-2xl font-bold ${isCorrect ? "text-green-700" : "text-red-700"}">
                            ${isCorrect ? "ถูกต้องค่ะ! 🎉" : "ไม่ถูกต้องค่ะ"}
                        </h3>
                    </div>
                    ${!isCorrect ? `<p class="text-gray-700 mb-4">คำตอบที่ถูกต้อง: <span class="font-bold text-lg">${correctAnswer}</span></p>` : ""}
                    <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 mt-4">
                        <i data-lucide="arrow-right" style="width: 20px; height: 20px;"></i>
                        โจทย์ถัดไป
                    </button>
                </div>
            `;
            
            lucide.createIcons();
            document.getElementById("next-btn").addEventListener("click", () => {
                currentQuestionIndex++;
                displayCurrentQuestion();
            });
        }

        function skipQuestion() {
            currentQuestionIndex++;
            displayCurrentQuestion();
        }

        function updateScoreDisplay() {
            if (allAnswers.length === 0) {
                document.getElementById("score-display").textContent = "0/0";
                return;
            }
            
            const correctCount = allAnswers.filter(a => a.isCorrect === "true").length;
            document.getElementById("score-display").textContent = `${correctCount}/${allAnswers.length}`;
        }

        function updateHistoryList() {
            const historyList = document.getElementById("history-list");
            
            if (allAnswers.length === 0) {
                historyList.innerHTML = '<p class="text-gray-500 text-center py-8">ยังไม่มีประวัติการทำโจทย์</p>';
                return;
            }

            const sortedAnswers = [...allAnswers].reverse();
            historyList.innerHTML = sortedAnswers.map((answer, index) => `
                <div class="border-2 rounded-lg p-4 ${answer.isCorrect === "true" ? "border-green-300 bg-green-50" : "border-red-300 bg-red-50"}">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold mr-2">
                                ${answer.topic}
                            </span>
                            <span class="inline-block px-3 py-1 ${answer.isCorrect === "true" ? "bg-green-100 text-green-700" : "bg-red-100 text-red-700"} rounded-full text-xs font-semibold">
                                ${answer.isCorrect === "true" ? "✓ ถูก" : "✗ ผิด"}
                            </span>
                        </div>
                    </div>
                    <p class="text-gray-800 font-medium mb-2">${answer.question}</p>
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <div>
                            <p class="text-gray-600">คำตอบของคุณ:</p>
                            <p class="font-semibold text-gray-800">${answer.userAnswer}</p>
                        </div>
                        <div>
                            <p class="text-gray-600">คำตอบที่ถูก:</p>
                            <p class="font-semibold text-gray-800">${answer.correctAnswer}</p>
                        </div>
                    </div>
                </div>
            `).join("");
        }

        // Tab switching
        document.getElementById("practice-tab").addEventListener("click", () => {
            document.getElementById("practice-section").classList.remove("hidden");
            document.getElementById("review-section").classList.add("hidden");
            document.getElementById("practice-tab").classList.add("text-green-600", "border-green-600");
            document.getElementById("practice-tab").classList.remove("text-gray-600", "border-transparent");
            document.getElementById("review-tab").classList.remove("text-green-600", "border-green-600");
            document.getElementById("review-tab").classList.add("text-gray-600", "border-transparent");
        });

        document.getElementById("review-tab").addEventListener("click", () => {
            document.getElementById("practice-section").classList.add("hidden");
            document.getElementById("review-section").classList.remove("hidden");
            document.getElementById("review-tab").classList.add("text-green-600", "border-green-600");
            document.getElementById("review-tab").classList.remove("text-gray-600", "border-transparent");
            document.getElementById("practice-tab").classList.remove("text-green-600", "border-green-600");
            document.getElementById("practice-tab").classList.add("text-gray-600", "border-transparent");
        });

        // Event listeners
        document.getElementById("submit-btn").addEventListener("click", submitAnswer);
        document.getElementById("skip-btn").addEventListener("click", skipQuestion);
        
        document.getElementById("user-answer").addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                submitAnswer();
            }
        });

        // Initialize
        initializeSystems();
    </script>

</html>
