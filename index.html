<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Mai Learning Platform</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        
        /* สไตล์ปุ่มสีแดงไล่เฉด (สร้างด้วย CSS) */
        .custom-red-button {
            background: linear-gradient(to bottom, #eb4444 0%, #b91c1c 100%);
            border: 1px solid #fca5a5;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.2s;
        }

        /* เมื่อปุ่มถูกเลือก (Active) ให้จางลงตามที่คุณต้องการ */
        .btn-active {
            opacity: 0.4;
            transform: scale(0.98);
            box-shadow: none;
        }

        .banner-box img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden">

    <div class="banner-box border-b-4 border-blue-500">
        <img src="img/banner.gif" alt="แบนเนอร์จังหวัดเชียงใหม่">
    </div>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-64 bg-slate-900 p-6 flex flex-col gap-4 shadow-2xl">
            <h2 class="text-white text-sm font-bold mb-2 opacity-50 uppercase tracking-widest">Main Menu</h2>
            
            <button id="nav-home" onclick="showPage('home')" 
                class="custom-red-button btn-active w-full py-3 px-4 rounded-xl text-white font-bold flex items-center justify-center gap-2">
                <i data-lucide="home" class="w-5 h-5"></i> หน้าแรก
            </button>

            <button id="nav-history" onclick="showPage('history')" 
                class="custom-red-button w-full py-3 px-4 rounded-xl text-white font-bold flex items-center justify-center gap-2">
                <i data-lucide="history" class="w-5 h-5"></i> ประวัติ
            </button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            <div id="page-home" class="space-y-6">
                <h1 class="text-3xl font-bold text-blue-900">ยินดีต้อนรับสู่แหล่งเรียนรู้</h1>
                <div class="p-20 bg-white rounded-3xl shadow-xl border border-blue-100 text-center">
                    <p class="text-gray-500">เนื้อหาหน้าแรกปรากฏที่นี่...</p>
                </div>
            </div>

            <div id="page-history" class="hidden space-y-6">
                <h1 class="text-3xl font-bold text-red-800">ประวัติการใช้งาน</h1>
                <div class="p-20 bg-white rounded-3xl shadow-xl border border-red-100 text-center">
                    <p class="text-gray-500">ข้อมูลประวัติปรากฏที่นี่...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // เริ่มต้นสร้างไอคอน Lucide
        lucide.createIcons();

        function showPage(pageName) {
            const homeBtn = document.getElementById('nav-home');
            const historyBtn = document.getElementById('nav-history');
            const homePage = document.getElementById('page-home');
            const historyPage = document.getElementById('page-history');

            if (pageName === 'home') {
                // สลับหน้า
                homePage.classList.remove('hidden');
                historyPage.classList.add('hidden');
                // จัดการความจางของปุ่ม (Active = จาง)
                homeBtn.classList.add('btn-active');
                historyBtn.classList.remove('btn-active'); 
            } else {
                // สลับหน้า
                homePage.classList.add('hidden');
                historyPage.classList.remove('hidden');
                // จัดการความจางของปุ่ม (Active = จาง)
                homeBtn.classList.remove('btn-active');
                historyBtn.classList.add('btn-active');
            }
        }
    </script>
</body>
</html>
