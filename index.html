<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Mai Learning Platform</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        
        .btn-red {
            background: linear-gradient(to bottom, #eb4444 0%, #b91c1c 100%);
            border: 1px solid #fca5a5;
            transition: all 0.2s;
            color: white;
        }

        .btn-active {
            opacity: 0.4;
            transform: scale(0.95);
        }

        /* ส่วนล่างสีม่วงตามรูป */
        .footer-purple {
            background-color: #6311f3; /* สีม่วงตามรูปภาพที่ส่งมา */
            color: #a5f3fc; /* ตัวหนังสือสีฟ้าอ่อนตามรูป */
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen overflow-hidden">

    <header class="banner-box shadow-sm z-30 flex-none">
        <img src="img/banner.gif" alt="แบนเนอร์" class="w-full h-auto max-h-[120px] object-cover">
    </header>

    <div class="flex flex-1 overflow-hidden relative">
        
        <aside class="w-20 md:w-56 bg-slate-950 flex flex-col items-center md:items-stretch p-3 md:p-6 gap-3 shadow-xl z-20">
            <button id="nav-home" onclick="showPage('home')" 
                class="btn-red btn-active w-full py-2.5 rounded-xl flex flex-col md:flex-row items-center justify-center gap-1 md:gap-3">
                <i data-lucide="home" class="w-5 h-5"></i>
                <span class="text-[10px] md:text-sm font-bold">หน้าแรก</span>
            </button>

            <button id="nav-history" onclick="showPage('history')" 
                class="btn-red w-full py-2.5 rounded-xl flex flex-col md:flex-row items-center justify-center gap-1 md:gap-3">
                <i data-lucide="history" class="w-5 h-5"></i>
                <span class="text-[10px] md:text-sm font-bold">ประวัติ</span>
            </button>
        </aside>

        <main class="flex-1 overflow-y-auto p-4 md:p-10 bg-white">
            <div id="page-home" class="max-w-2xl mx-auto text-center space-y-6">
                <h1 class="text-2xl font-bold text-blue-900 mt-4 uppercase tracking-tight">Career Skills Learning</h1>
                <div class="p-16 bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200">
                    <p class="text-slate-400">เลือกเมนูเพื่อเริ่มต้นการเรียนรู้</p>
                </div>
            </div>

            <div id="page-history" class="hidden max-w-2xl mx-auto space-y-6">
                <h1 class="text-2xl font-bold text-red-800 border-b pb-2">ประวัติการใช้งาน</h1>
                <div class="bg-white p-6 rounded-2xl border border-slate-100 italic text-slate-400">
                    ยังไม่มีข้อมูลประวัติ
                </div>
            </div>
        </main>
    </div>

    <footer class="footer-purple py-4 px-6 text-center shadow-[0_-4px_10px_rgba(0,0,0,0.1)] z-30 flex-none">
        <div class="space-y-1">
            <p class="font-bold text-sm md:text-base">นายชวัลวิทย์ รสแก้ว</p>
            <p class="text-xs md:text-sm">ชั้นมัธยมศึกษาปีที่ 5/3 เลขที่ 4</p>
            <p class="text-[10px] md:text-xs opacity-90 uppercase tracking-widest">โรงเรียนดงเจนวิทยาคม</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();

        function showPage(pageName) {
            const homeBtn = document.getElementById('nav-home');
            const historyBtn = document.getElementById('nav-history');
            const homePage = document.getElementById('page-home');
            const historyPage = document.getElementById('page-history');

            if (pageName === 'home') {
                homePage.classList.remove('hidden');
                historyPage.classList.add('hidden');
                homeBtn.classList.add('btn-active');
                historyBtn.classList.remove('btn-active');
            } else {
                homePage.classList.add('hidden');
                historyPage.classList.remove('hidden');
                homeBtn.classList.remove('btn-active');
                historyBtn.classList.add('btn-active');
            }
        }
    </script>
</body>
</html>
