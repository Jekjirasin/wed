<!doctype html>
<html lang="th" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Mai Learning Platform</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; overflow: hidden; }
        
        /* สไตล์ปุ่มสีแดงขนาดกะทัดรัด (Compact) */
        .btn-red-compact {
            background: linear-gradient(to bottom, #eb4444 0%, #b91c1c 100%);
            border: 1px solid #fca5a5;
            transition: all 0.2s;
            color: white;
            font-size: 14px;
            padding: 6px 5px;
            width: 100%;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ปุ่มจางลงเมื่อ Active ตามที่คุณต้องการ */
        .btn-active {
            opacity: 0.4;
            transform: scale(0.97);
        }

        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body class="bg-slate-50 flex flex-col h-screen">

    <header class="banner-container flex-none shadow-sm z-30">
        <img src="img/banner.gif" alt="แบนเนอร์">
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-32 md:w-40 bg-[#111827] flex flex-col p-4 gap-3 shadow-xl z-20">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2 px-1">Main Menu</p>
            
            <button id="nav-home" onclick="showPage('home')" 
                class="btn-red-compact btn-active">
                <i data-lucide="home" class="w-4 h-4"></i>
                <span>หน้าแรก</span>
            </button>

            <button id="nav-history" onclick="showPage('history')" 
                class="btn-red-compact">
                <i data-lucide="history" class="w-4 h-4"></i>
                <span>ประวัติ</span>
            </button>
        </aside>

        <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-white">
            
            <div id="page-home" class="max-w-4xl mx-auto space-y-6">
                <h1 class="text-2xl font-bold text-[#1e3a8a]">ยินดีต้อนรับสู่แหล่งเรียนรู้</h1>
                <div class="mt-8 p-16 bg-[#f8fafc] rounded-[2rem] shadow-inner border border-slate-100 text-center">
                    <p class="text-slate-400">เนื้อหาหน้าแรกปรากฏที่นี่...</p>
                </div>
            </div>

            <div id="page-history" class="hidden max-w-4xl mx-auto space-y-6">
                <h1 class="text-2xl font-bold text-red-800">ประวัติการใช้งาน</h1>
                <div class="mt-8 p-16 bg-white rounded-[2rem] shadow-inner border border-red-50 text-center">
                    <p class="text-slate-400">ข้อมูลประวัติปรากฏที่นี่...</p>
                </div>
            </div>

        </main>
    </div>

    <footer class="bg-[#6311f3] text-[#a5f3fc] py-3 text-center z-30 flex-none">
        <p class="font-bold text-sm">นายชวัลวิทย์ รสแก้ว</p>
        <p class="text-[11px] opacity-90">ชั้นมัธยมศึกษาปีที่ 5/3 เลขที่ 4</p>
        <p class="text-[10px] opacity-80 mt-1">โรงเรียนดงเจนวิทยาคม</p>
    </footer>

    <script>
        lucide.createIcons();

        function showPage(pageName) {
            const homeBtn = document.getElementById('nav-home');
            const historyBtn = document.getElementById('nav-history');
            const homePage = document.getElementById('page-home');
            const historyPage = document.getElementById('page-history');

            if (pageName === 'home') {
                homePage.classList.remove('hidden');
                historyPage.classList.add('hidden');
                homeBtn.classList.add('btn-active');
                historyBtn.classList.remove('btn-active');
            } else {
                homePage.classList.add('hidden');
                historyPage.classList.remove('hidden');
                homeBtn.classList.remove('btn-active');
                historyBtn.classList.add('btn-active');
            }
        }
    </script>
</body>
</html>
